apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: retail-intelligence
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: retail-intelligence/backend:0.1.0
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: retail-config
            - secretRef:
                name: retail-secrets
          env:
            - name: DATABASE_URL
              value: jdbc:postgresql://postgres:5432/retail_intelligence
            - name: DATABASE_USERNAME
              value: retail_admin
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: retail-intelligence
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
