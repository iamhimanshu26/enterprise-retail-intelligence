apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-service
  namespace: retail-intelligence
  labels:
    app: data-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: data-service
  template:
    metadata:
      labels:
        app: data-service
    spec:
      containers:
        - name: data-service
          image: retail-intelligence/data-service:0.1.0
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: retail-config
            - secretRef:
                name: retail-secrets
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "400m"

---
apiVersion: v1
kind: Service
metadata:
  name: data-service
  namespace: retail-intelligence
spec:
  selector:
    app: data-service
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
