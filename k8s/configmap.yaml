apiVersion: v1
kind: ConfigMap
metadata:
  name: retail-config
  namespace: retail-intelligence
data:
  CORS_ALLOWED_ORIGINS: "https://retail.example.com"
  DATA_SERVICE_URL: "http://data-service:8000"
  BACKEND_URL: "http://backend:8080"
  LOG_LEVEL: "INFO"

---
apiVersion: v1
kind: Secret
metadata:
  name: retail-secrets
  namespace: retail-intelligence
type: Opaque
stringData:
  DATABASE_PASSWORD: "change-me-in-production"
  JWT_SECRET: "change-me-in-production-minimum-256-bits"
